test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

amazon:
  service: S3
  access_key_id: <%= ENV.fetch("AWS_ACCESS_KEY_ID", "test-access-key") %>
  secret_access_key: <%= ENV.fetch("AWS_SECRET_ACCESS_KEY", "test-secret-key") %>
  region: <%= ENV.fetch("AWS_REGION", "eu-west-2") %>
  bucket: <%= ENV.fetch("PRIVATE_STORAGE_BUCKET", "parsy-private-test") %>
  public: false

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

