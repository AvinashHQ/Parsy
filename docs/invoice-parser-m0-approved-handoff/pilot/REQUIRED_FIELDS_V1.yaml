profile_version: pilot_fields_v1.0
canonical_schema: canonical_invoice_v2
required_for_document_completion:
- path: document_type
  risk: high
  evidence_required: true
- path: source.file_hash
  risk: system
  evidence_required: false
- path: locale.document_language
  risk: medium
  evidence_required: false
- path: supplier.display_name
  risk: high
  evidence_required: true
- path: invoice.number
  risk: high
  evidence_required: true
- path: invoice.issue_date
  risk: high
  evidence_required: true
- path: invoice.currency
  risk: critical
  evidence_required: true
- path: totals.payable_amount
  risk: critical
  evidence_required: true
- path: evidence
  risk: system
  evidence_required: false
required_when_present_or_applicable:
- path: supplier.identifiers[]
  condition: source contains operational/tax identifier
  risk: high
- path: buyer
  condition: buyer is printed or pilot requires buyer validation
  risk: medium
- path: invoice.due_date
  condition: source contains due date
  risk: medium
- path: references[]
  condition: purchase order, contract or original invoice reference is present
  risk: medium
- path: totals.tax_exclusive_amount
  condition: source provides subtotal/tax-exclusive total
  risk: high
- path: totals.total_tax_amount
  condition: source contains tax
  risk: high
- path: tax_breakdowns[]
  condition: source contains one or more tax components
  risk: high
- path: line_items[]
  condition: pilot profile requires line items
  risk: high
  initial_acceptance: review_required
- path: payment
  condition: payment terms/details required by export profile
  risk: medium
never_infer_without_explicit_uncertainty:
- invoice.currency
- supplier.identifiers[]
- tax_breakdowns[].rate
- tax_breakdowns[].tax_amount
- line_items[].quantity
- line_items[].unit_price
not_part_of_global_core:
- GSTIN
- CGST
- SGST
- IGST
- VAT registration as a dedicated column
- US state tax columns
- Tally ledger name
