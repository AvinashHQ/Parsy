schema_version: '2.0'
standards:
  country: ISO-3166-1-alpha-2
  currency: ISO-4217-alpha
  language: BCP-47
  normalized_date: ISO-8601-date
  money_transport: decimal-string-up-to-8-fractional-digits
high_risk_fields:
  - /invoice/number
  - /invoice/issue_date
  - /invoice/currency
  - /supplier/identifiers
  - /buyer/identifiers
  - /totals/tax_exclusive_amount
  - /totals/total_tax_amount
  - /totals/tax_inclusive_amount
  - /totals/payable_amount
  - /tax_breakdowns
  - /line_items/*/line_net_amount
  - /line_items/*/tax_breakdowns
normalization:
  unknown: null
  ambiguous_date: null_with_uncertainty
  currency_symbol_without_disambiguation: null_with_uncertainty
  identifiers: preserve_scheme_and_country
  tax: generic_breakdown_array
  item_classification: preserve_source_scheme
  text: preserve_unicode
payment_data_policy:
  default: masked
  allowed_fields: [payment_reference, account_last4, iban_last4, bic]
export_relations:
  invoices_key: document_id
  parties_foreign_key: document_id
  party_identifiers_foreign_key: party_id
  tax_breakdowns_foreign_key: document_id_or_line_id
  line_items_foreign_key: document_id
